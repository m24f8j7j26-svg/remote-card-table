<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Spades Table</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="stylesheet" href="styles.css?v=20260719c" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="Game controls">
        <div>
          <p class="eyebrow">Remote Card Table</p>
          <h1>Two-player table</h1>
          <p class="version-note">Spades compact table v20260719c</p>
        </div>
        <div class="room-panel">
          <a class="nav-button" href="handfoot.html">Hand & Foot</a>
          <a class="nav-button" href="texas.html">Hold'em</a>
          <button id="hostBtn" type="button">Host room</button>
          <button id="copyBtn" type="button" disabled>Copy code</button>
          <button id="clearRoomBtn" type="button">Clear code</button>
          <label class="join-field">
            <span>Room code</span>
            <input id="roomInput" type="text" autocomplete="off" spellcheck="false" placeholder="SPADES-1234" />
          </label>
          <button id="joinBtn" type="button">Join</button>
        </div>
      </section>

      <section class="status-strip" aria-live="polite">
        <div>
          <span class="label">Connection</span>
          <strong id="connectionStatus">Not connected</strong>
        </div>
        <div>
          <span class="label">You are</span>
          <strong id="seatStatus">Choose Host or Join</strong>
        </div>
        <div>
          <span class="label">Room</span>
          <strong id="roomStatus">-</strong>
        </div>
      </section>

      <section class="scoreboard" aria-label="Scoreboard">
        <div>
          <span>South</span>
          <strong id="southScore">0</strong>
        </div>
        <div>
          <span>North</span>
          <strong id="northScore">0</strong>
        </div>
        <div>
          <span>Hand</span>
          <strong id="handNumber">1</strong>
        </div>
      </section>

      <section class="table-shell">
        <div class="player seat-north" id="seatNorth"></div>
        <div class="player seat-south" id="seatSouth"></div>

        <div class="table">
          <div class="trick-area" id="trickArea"></div>
          <div class="message" id="gameMessage">Host a room, then share the room code with your partner.</div>
        </div>
      </section>

      <section class="action-bar">
        <div class="bid-controls" id="bidControls" aria-label="Game controls"></div>
        <button id="newHandBtn" type="button">New hand</button>
        <button id="newGameBtn" type="button">New game</button>
      </section>

      <section class="hand-panel" aria-label="Your hand">
        <div class="hand-header">
          <span>Your hand</span>
          <strong id="turnStatus">Waiting</strong>
        </div>
        <div class="hand" id="hand"></div>
      </section>

    </main>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="app.js?v=20260719a"></script>
  </body>
</html>
